version: "3.9"

services:

  # =========================================
  # FTP Server (Pure-FTPd)
  # =========================================
  ftp:
    image: stilliard/pure-ftpd:latest
    container_name: healthcare-ftp
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    environment:
      PUBLICHOST: "localhost"
      FTP_USER_NAME: "healthcare"
      FTP_USER_PASS: "healthcare123"
      FTP_USER_HOME: "/home/healthcare"
      FTP_MAX_CLIENTS: "10"
      FTP_PASSIVE_PORTS: "30000:30009"
    volumes:
      - ftp-data:/home/healthcare
    restart: unless-stopped

  # =========================================
  # ActiveMQ Artemis (JMS Broker)
  # =========================================
  activemq:
    image: apache/activemq-artemis:2.37.0
    container_name: healthcare-activemq
    ports:
      - "61616:61616"   # Core / AMQP
      - "8161:8161"     # Web Console
    environment:
      ARTEMIS_USER: "artemis"
      ARTEMIS_PASSWORD: "artemis"
      ANONYMOUS_LOGIN: "true"
      EXTRA_ARGS: "--http-host 0.0.0.0 --relax-jolokia"
    restart: unless-stopped

  # =========================================
  # Kafka (KRaft mode — no Zookeeper)
  # =========================================
  kafka:
    image: apache/kafka:3.8.1
    container_name: healthcare-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "healthcare-kafka-cluster-001"
    restart: unless-stopped

  # =========================================
  # HAPI FHIR Server (R4)
  # =========================================
  fhir:
    image: hapiproject/hapi:v7.4.0
    container_name: healthcare-fhir
    ports:
      - "8090:8080"
    environment:
      hapi.fhir.default_encoding: JSON
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_multiple_delete: "true"
      hapi.fhir.server_address: "http://localhost:8090/fhir"
    restart: unless-stopped

  # =========================================
  # HL7 MLLP Test Receiver (optional)
  # Using a simple netcat listener for dev
  # =========================================
  mllp-receiver:
    image: alpine:3.19
    container_name: healthcare-mllp-receiver
    ports:
      - "2575:2575"
    command: >
      sh -c "apk add --no-cache socat &&
             echo 'MLLP receiver listening on port 2575...' &&
             socat TCP-LISTEN:2575,reuseaddr,fork STDOUT"
    restart: unless-stopped

volumes:
  ftp-data:
