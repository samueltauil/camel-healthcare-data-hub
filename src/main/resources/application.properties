# ============================================================
# Camel Data Layer — Application Configuration
# ============================================================

# ----------------------------------------------------------
# Quarkus HTTP (REST & SOAP share this port)
# ----------------------------------------------------------
quarkus.http.port=8080

# ----------------------------------------------------------
# FTP Inbound Polling
# ----------------------------------------------------------
ftp.host=localhost
ftp.port=21
ftp.username=healthcare
ftp.password=healthcare123
ftp.directory=inbox
ftp.poll.delay=5000
ftp.move.done=.done
ftp.move.failed=.error

# ----------------------------------------------------------
# HL7 MLLP Outbound
# ----------------------------------------------------------
mllp.host=localhost
mllp.port=2575

# ----------------------------------------------------------
# FHIR R4 Server
# ----------------------------------------------------------
fhir.server.url=http://localhost:8090/fhir

# ----------------------------------------------------------
# JMS / ActiveMQ Artemis
# ----------------------------------------------------------
quarkus.artemis.url=tcp://localhost:61616
quarkus.artemis.username=artemis
quarkus.artemis.password=artemis

jms.queue.patients=queue.patients
jms.queue.observations=queue.observations
jms.topic.clinical-events=topic.clinical-events

# ----------------------------------------------------------
# Kafka
# ----------------------------------------------------------
kafka.bootstrap.servers=localhost:9092
kafka.topic.patients=healthcare.patients.ingested
kafka.topic.observations=healthcare.observations.ingested
kafka.topic.errors=healthcare.errors

# ----------------------------------------------------------
# SOAP / CXF
# ----------------------------------------------------------
quarkus.cxf.path=/soap

# ----------------------------------------------------------
# Jackson / JSON serialization
# ----------------------------------------------------------
quarkus.jackson.serialization-inclusion=non-null
camel.dataformat.jackson.auto-discover-object-mapper=true

# ----------------------------------------------------------
# Logging
# ----------------------------------------------------------
quarkus.log.category."org.apache.camel".level=INFO
quarkus.log.category."com.healthcare".level=DEBUG
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] %s%e%n

# ----------------------------------------------------------
# Dev Profile Overrides
# ----------------------------------------------------------
%dev.ftp.host=localhost
%dev.mllp.host=localhost
%dev.fhir.server.url=http://localhost:8090/fhir
%dev.quarkus.dev-ui.cors.enabled=false
%dev.quarkus.console.enabled=false

# ----------------------------------------------------------
# Test Profile Overrides
# ----------------------------------------------------------
%test.ftp.host=localhost
%test.ftp.port=2121
%test.mllp.host=localhost
%test.mllp.port=12575
%test.fhir.server.url=http://localhost:8091/fhir
%test.kafka.bootstrap.servers=localhost:19092
%test.quarkus.artemis.url=tcp://localhost:61617
